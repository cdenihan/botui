name: stpvelox
description: "StpVelox is the new environment running on the wombat - Fast and Sleek"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  path: ^1.8.0
  xterm: ^4.0.0
  pty: ^0.1.1
  collection: ^1.17.0
  fl_chart: ^1.0.0
  sleek_circular_slider: ^2.1.0
  shared_preferences: ^2.5.3
  flutter_riverpod: ^2.6.1
  riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^16.2.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  hooks_riverpod: ^2.6.1
  flutter_hooks: ^0.21.3+1
  logging: ^1.3.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.5.4
  riverpod_generator: ^2.6.5
  freezed: ^3.1.0
  json_serializable: ^6.9.5
  custom_lint: ^0.7.6
  riverpod_lint: ^2.6.5
  lcm_codegen:
    path: ./lcm_codegen


flutter:
  uses-material-design: true
  assets:
    - assets/